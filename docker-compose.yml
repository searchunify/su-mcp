services:
  su-mcp:
    container_name: su-mcp
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE:-searchunifyutils/su-mcp:latest}
    networks:
      - shared_network
    deploy:
      resources:
        limits:
          memory: ${MEMORY:-512m}
    ports:
      - "${EXPOSED_PORT:-3000}:${MCP_HTTP_PORT:-3000}"
    environment:
      NODE_ENV: production
      MCP_TRANSPORT: http
      MCP_HTTP_PORT: ${MCP_HTTP_PORT:-3000}
      MCP_ISSUER_URL: ${MCP_ISSUER_URL}
      OAUTH_ENCRYPTION_KEY: ${OAUTH_ENCRYPTION_KEY}
      REDIS_URL: ${REDIS_URL:-}
      SU_TIMEOUT: ${SU_TIMEOUT:-60000}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${MCP_HTTP_PORT:-3000}/mcp"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: always

networks:
  shared_network:
    name: shared_network
    external: true
